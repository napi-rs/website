name: Deploy to Void

# Deploys on every push to main via GitHub OIDC — NO long-lived VOID_TOKEN
# secret. `void deploy` (>= 0.10.2) detects GitHub Actions, mints a short-lived
# GitHub OIDC token (audience "void"), exchanges it at
# $VOID_API_URL/auth/github-oidc for a short-lived, project-scoped deploy token,
# and deploys — so the deploy is a single `void deploy` step.
#
# WHY THIS FILE MUST BE NAMED `void-deploy.yml`: Void's OIDC exchange validates
# the token's `job_workflow_ref` against the canonical deploy-workflow path it
# scaffolds (`.github/workflows/void-deploy.yml`). A differently-named workflow
# is rejected — "oidc token is not from the void deploy workflow". (The PR gate
# lives in ci.yml precisely so this file stays the sole, canonically-named
# deploy workflow.)
#
# One-time maintainer setup: connect the repo with the `github_actions` executor
#   void github connect napi-rs --repo napi-rs/website \
#     --branch main --executor github_actions
#   # (or `void github update napi-rs --executor github_actions` if already connected)
# which also switches the project OFF Void's own platform container build, so
# this workflow is the single deploy path (no duplicate "Void Build").

on:
  push:
    branches: [main]

# Latest push wins: cancel an in-flight deploy for the same repo + branch so a
# newer commit is never overtaken by an older one.
concurrency:
  group: void-deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

# id-token: write is what lets the job (and thus `void deploy`) mint the GitHub
# OIDC token. No stored VOID_TOKEN secret.
permissions:
  id-token: write
  contents: read

env:
  # Read by `void deploy` for the OIDC exchange endpoint. Override with a
  # VOID_API_URL repo variable to target staging.
  VOID_API_URL: ${{ vars.VOID_API_URL || 'https://api.void.cloud' }}
  VOID_PROJECT: napi-rs # prod slug (napi-rs.void.app), NOT napi-rs-website

jobs:
  deploy:
    name: Deploy to Void
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Vite+ toolchain (Node 24 + Yarn install)
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      # Generate .void types before build so the production build resolves
      # generated virtual modules cleanly.
      - name: Generate Void types
        run: yarn prepare

      # Build first: `vite build` writes the client bundle to dist/client/ and
      # the worker bundle to dist/.
      #
      # GITHUB_TOKEN is consumed by the changelog Vite plugin
      # (lib/changelog/plugin.ts), which fetches the napi-rs release history at
      # BUILD time. napi-rs/napi-rs is PUBLIC, so the auto-provided Actions token
      # can read its releases (authenticated → 5000 req/hr; anonymous is 60/hr
      # and flakes on shared runner IPs → the plugin throws and fails the build).
      # No special scopes are needed (unlike the sponsors classic-PAT runtime
      # secret) — public read is enough. Swap to a dedicated PAT secret here if
      # you ever want a higher/own quota.
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn build

      # Sitemap MUST run AFTER build: scripts/generate-sitemap.mjs emits
      # sitemap.xml and the raw .md files INTO dist/client/. If it ran before
      # build, `vite build` would wipe dist/client and discard these files.
      - name: Generate sitemap (post-build, writes into dist/client)
        run: yarn sitemap

      # Single step: `void deploy` self-authenticates via GitHub OIDC (see
      # header). --skip-build ships the dist/ built above instead of triggering
      # its own `vite build`, which would clobber dist/client and drop the
      # sitemap.xml + raw .md emitted by the sitemap step.
      - name: Deploy
        run: npx void deploy --project "$VOID_PROJECT" --skip-build
